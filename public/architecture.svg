<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0D0B09"/>
  
  <!-- Title -->
  <text x="400" y="40" fill="#F0EBE3" font-family="Georgia" font-size="20" text-anchor="middle" font-weight="bold">StudioNXT — System Architecture</text>
  <text x="400" y="62" fill="#8A8480" font-family="Arial" font-size="11" text-anchor="middle">Gemini Live Agent Challenge Submission</text>

  <!-- User -->
  <rect x="330" y="85" width="140" height="50" rx="10" fill="#171410" stroke="#2E2820" stroke-width="1.5"/>
  <text x="400" y="107" fill="#F0EBE3" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">Artist / User</text>
  <text x="400" y="124" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Carol · 94 years · Stuttgart</text>

  <!-- Arrow down -->
  <line x1="400" y1="135" x2="400" y2="165" stroke="#2E2820" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Next.js Frontend -->
  <rect x="270" y="165" width="260" height="55" rx="10" fill="#171410" stroke="#7e22ce" stroke-width="1.5"/>
  <text x="400" y="188" fill="#a855f7" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">FRONTEND</text>
  <text x="400" y="203" fill="#F0EBE3" font-family="Arial" font-size="11" text-anchor="middle">Next.js 14 · TypeScript · Tailwind</text>
  <text x="400" y="216" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Deployed on Vercel · PWA enabled</text>

  <!-- Three columns below -->
  <!-- Firebase -->
  <rect x="50" y="295" width="200" height="130" rx="10" fill="#171410" stroke="#F9A825" stroke-width="1.5"/>
  <text x="150" y="318" fill="#F9A825" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">GOOGLE CLOUD</text>
  <text x="150" y="333" fill="#F0EBE3" font-family="Arial" font-size="11" text-anchor="middle">Firebase Platform</text>
  <text x="150" y="352" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Firestore — artwork records</text>
  <text x="150" y="366" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Storage — original images</text>
  <text x="150" y="380" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Authentication — magic link</text>
  <text x="150" y="394" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Hosting — web deployment</text>
  <text x="150" y="410" fill="#F9A825" font-family="Arial" font-size="8" text-anchor="middle">studionxt-2657b</text>

  <!-- Gemini -->
  <rect x="300" y="295" width="200" height="130" rx="10" fill="#171410" stroke="#4285F4" stroke-width="1.5"/>
  <text x="400" y="318" fill="#4285F4" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">GEMINI AI — Google</text>
  <text x="400" y="333" fill="#F0EBE3" font-family="Arial" font-size="11" text-anchor="middle">Gemini 1.5 Flash</text>
  <text x="400" y="352" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Artist biography generation</text>
  <text x="400" y="366" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Artist statement writing</text>
  <text x="400" y="380" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Creative narrative output</text>
  <text x="400" y="394" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">via /api/gemini route</text>
  <text x="400" y="410" fill="#4285F4" font-family="Arial" font-size="8" text-anchor="middle">Google AI Studio API</text>

  <!-- Claude -->
  <rect x="550" y="295" width="200" height="130" rx="10" fill="#171410" stroke="#C4A35A" stroke-width="1.5"/>
  <text x="650" y="318" fill="#C4A35A" font-family="Arial" font-size="10" text-anchor="middle" font-weight="bold">CLAUDE AI — Anthropic</text>
  <text x="650" y="333" fill="#F0EBE3" font-family="Arial" font-size="11" text-anchor="middle">Claude Sonnet</text>
  <text x="650" y="352" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Mira — archive intelligence</text>
  <text x="650" y="366" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Artwork valuation engine</text>
  <text x="650" y="380" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">Voice session analysis</text>
  <text x="650" y="394" fill="#8A8480" font-family="Arial" font-size="9" text-anchor="middle">via /api/mira route</text>
  <text x="650" y="410" fill="#C4A35A" font-family="Arial" font-size="8" text-anchor="middle">Anthropic API</text>

  <!-- Arrows from frontend to three boxes -->
  <line x1="280" y1="220" x2="180" y2="295" stroke="#F9A825" stroke-width="1" stroke-dasharray="4"/>
  <line x1="400" y1="220" x2="400" y2="295" stroke="#4285F4" stroke-width="1" stroke-dasharray="4"/>
  <line x1="520" y1="220" x2="620" y2="295" stroke="#C4A35A" stroke-width="1" stroke-dasharray="4"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2E2820"/>
    </marker>
  </defs>

  <!-- Bottom label -->
  <text x="400" y="460" fill="#5A5450" font-family="Arial" font-size="9" text-anchor="middle">StudioNXT · artNXT Company Stuttgart · Gemini Live Agent Challenge 2025</text>
</svg>